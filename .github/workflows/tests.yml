name: Tests
on: [push, pull_request]

jobs:
  # 运行单元测试，覆盖多个 Python 版本和操作系统
  test:
    name: ${{ matrix.os }} - Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.12"]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Set up Node.js (for syntax check)
      uses: actions/setup-node@v4
      with:
        node-version: "20"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run all tests
      run: |
        python -m pytest tests/ -v --cov=scripts --cov-report=term

    - name: Check install script syntax (Linux/macOS only)
      if: runner.os != 'Windows'
      run: |
        bash -n install.sh
        echo "✅ install.sh syntax OK"

    - name: Check coverage minimum 80%
      run: |
        python scripts/ci_check_coverage.py --min-coverage 80
      if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
